<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoLaJJ-wiki</title>
    <link rel="stylesheet" href="css/icons-subset.css">
    <link rel="stylesheet" href="css/enhanced.css">
    <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="search-overlay-backdrop" id="searchOverlayBackdrop"></div>
    <div class="search-overlay" id="searchOverlay">
        <div class="search-shell">
            <div class="search-container">
                <div class="search-icon">
                    <i class="fas fa-search"></i>
                </div>
                <input 
                    type="text" 
                    class="search-box" 
                    placeholder="搜索网站..."
                    id="headerSearchBox"
                >
                <span class="search-shortcut">Ctrl K</span>
                <button class="search-clear" id="headerSearchClear">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <button class="sidebar-toggle floating-toggle" id="sidebarToggle" type="button" aria-label="打开侧边栏">
        <i class="fas fa-bars"></i>
    </button>

    <div class="quick-dock">
        <div class="quick-dock-links">
            <a href="https://folajj.github.io/#/" target="_blank" class="blog-link quick-link" aria-label="打开 MyBlog">
                <i class="fas fa-blog"></i>
                <span>MyBlog</span>
            </a>
            <a href="https://github.com/FoLaJJ" target="_blank" class="github-link quick-link" aria-label="打开 GitHub">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path fill="currentColor" d="M12 2C6.48 2 2 6.58 2 12.22c0 4.5 2.87 8.32 6.84 9.66.5.1.66-.22.66-.5 0-.24-.01-1.05-.01-1.9-2.78.62-3.37-1.2-3.37-1.2-.46-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .08 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.92.86.09-.67.35-1.12.64-1.38-2.22-.26-4.55-1.14-4.55-5.1 0-1.13.39-2.06 1.03-2.79-.1-.26-.45-1.31.1-2.73 0 0 .85-.28 2.8 1.06A9.45 9.45 0 0 1 12 6.84c.85 0 1.7.12 2.5.36 1.95-1.34 2.8-1.06 2.8-1.06.55 1.42.2 2.47.1 2.73.64.73 1.03 1.66 1.03 2.79 0 3.97-2.34 4.84-4.57 5.09.36.32.68.95.68 1.92 0 1.38-.01 2.49-.01 2.83 0 .28.17.61.67.5A10.17 10.17 0 0 0 22 12.22C22 6.58 17.52 2 12 2Z"/>
                </svg>
                <span>GitHub</span>
            </a>
        </div>
        <button class="search-fab quick-link quick-link-button" id="searchFab" type="button" aria-label="搜索">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </button>
    </div>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">
                <i class="fas fa-compass"></i>
            </div>
            <div class="sidebar-brand-text">
                <strong>FoLaJJ</strong>
                <span>导航页</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <!-- 导航菜单将通过JavaScript动态生成 -->
        </nav>
    </aside>

    <!-- 主要内容区域 -->
    <main class="main-content" id="mainContent">
        <div class="content-wrapper">
            <!-- 内容将通过JavaScript动态生成 -->
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app-enhanced.js"></script>

    <button class="scroll-top" id="scrollTopBtn" type="button" aria-label="回到顶部">
        <i class="fas fa-arrow-up"></i>
    </button>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoLaJJ-wiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/enhanced.css">
    <link rel="shortcut icon" href="favicon/favicon.ico" type="image/x-icon">
</head>
<body>
    <div class="search-overlay-backdrop" id="searchOverlayBackdrop"></div>
    <div class="search-overlay" id="searchOverlay">
        <div class="search-shell">
            <div class="search-container">
                <div class="search-icon">
                    <i class="fas fa-search"></i>
                </div>
                <input 
                    type="text" 
                    class="search-box" 
                    placeholder="搜索网站..."
                    id="headerSearchBox"
                >
                <span class="search-shortcut">Ctrl K</span>
                <button class="search-clear" id="headerSearchClear">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </div>
    </div>

    <button class="sidebar-toggle floating-toggle" id="sidebarToggle" type="button" aria-label="打开侧边栏">
        <i class="fas fa-bars"></i>
    </button>

    <div class="quick-dock">
        <div class="quick-dock-links">
            <a href="https://folajj.github.io/#/" target="_blank" class="blog-link quick-link" aria-label="打开 MyBlog">
                <i class="fas fa-blog"></i>
                <span>MyBlog</span>
            </a>
            <a href="https://github.com/FoLaJJ" target="_blank" class="github-link quick-link" aria-label="打开 GitHub">
                <i class="fab fa-github"></i>
                <span>GitHub</span>
            </a>
        </div>
        <button class="search-fab quick-link quick-link-button" id="searchFab" type="button" aria-label="搜索">
            <i class="fas fa-search"></i>
            <span>Search</span>
        </button>
    </div>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon">
                <i class="fas fa-compass"></i>
            </div>
            <div class="sidebar-brand-text">
                <strong>FoLaJJ</strong>
                <span>导航页</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <!-- 导航菜单将通过JavaScript动态生成 -->
        </nav>
    </aside>

    <!-- 主要内容区域 -->
    <main class="main-content" id="mainContent">
        <div class="content-wrapper">
            <!-- 内容将通过JavaScript动态生成 -->
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app-enhanced.js"></script>

    <button class="scroll-top" id="scrollTopBtn" type="button" aria-label="回到顶部">
        <i class="fas fa-arrow-up"></i>
    </button>
</body>
</html>
